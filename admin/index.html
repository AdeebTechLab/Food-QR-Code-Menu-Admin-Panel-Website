<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Menu Admin — Hot N Spicy</title>
<link rel="icon" href="/assets/favicon.ico?v=20260708b">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <div id="auth-gate" class="auth-gate">Checking session…</div>

  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo-badge">HS</div>
        <div>
          <h1>Menu Manager</h1>
          <p class="signed-in-as">Signed in as <span id="username-label"></span></p>
        </div>
      </div>
      <div class="topbar-right">
        <span id="save-status" class="save-status"></span>
        <button id="save-btn" class="btn btn-primary">Save Changes</button>
        <button id="logout-btn" class="btn btn-ghost">Log Out</button>
      </div>
    </header>

    <div id="banner" class="banner hidden"></div>

    <main class="main">
      <div class="toolbar">
        <button id="add-category-btn" class="btn btn-secondary">+ Add Category</button>
        <button id="clear-badges-btn" class="btn btn-secondary">Clear All Badges</button>
        <button id="clear-menu-btn" class="btn btn-danger">Remove All Categories &amp; Items</button>
        <p class="hint">Edit any field below, then click <strong>Save Changes</strong> to publish it to the live site.</p>
      </div>

      <div id="categories-container"></div>
    </main>
  </div>

  <!-- Template for a category block -->
  <template id="category-template">
    <section class="category-card">
      <div class="category-header">
        <input type="text" class="cat-title-input" placeholder="Category title, e.g. Beverages">
        <input type="text" class="cat-id-input" placeholder="category-id (used internally)">
        <button class="btn btn-danger btn-sm delete-category-btn">Delete Category</button>
      </div>
      <div class="items-grid"></div>
      <button class="btn btn-secondary add-item-btn">+ Add Item</button>
    </section>
  </template>

  <!-- Template for a single menu item card -->
  <template id="item-template">
    <div class="item-card">
      <div class="item-photo">
        <img class="item-photo-img" alt="">
        <label class="photo-upload-label">
          Change Photo
          <input type="file" accept="image/*" class="photo-input">
        </label>
      </div>
      <div class="item-fields">
        <input type="text" class="item-name-input" placeholder="Item name">
        <textarea class="item-desc-input" placeholder="Description (optional)" rows="2"></textarea>
        <div class="item-row">
          <label class="price-label">Rs. <input type="number" class="item-price-input" min="0" step="1"></label>
          <input type="text" class="item-badge-input" placeholder="Badge (optional), e.g. Best Seller">
        </div>
        <label class="checkbox-label">
          <input type="checkbox" class="item-pricefrom-input"> Show price as "From"
        </label>
        <label class="checkbox-label best-deal-label">
          <input type="checkbox" class="item-bestdeal-input"> ⭐ Feature in "Best Deals" tab
        </label>
      </div>
      <button class="btn btn-danger btn-sm delete-item-btn">Delete</button>
    </div>
  </template>

  <script src="/admin/admin.js"></script>
</body>
</html>
