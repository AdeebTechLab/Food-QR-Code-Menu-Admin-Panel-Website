<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Admin · Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF9; --surface: #FFFFFF; --border: #E4E3E0;
    --text: #1C1C1E; --text-muted: #6B6B68;
    --accent: #2452B8; --accent-hover: #1D439C;
    --danger: #C4472A; --danger-bg: #FBEBE6;
    --success: #1F8A5E; --success-bg: #E9F6EF;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); font-family: 'Inter', system-ui, sans-serif; color: var(--text); }
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 5; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .mark { width: 10px; height: 10px; background: var(--accent); border-radius: 2px; }
  .brand h1 { font-size: 15px; font-weight: 600; margin: 0; }
  .repo-label { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  #saveBtn { background: var(--success); color: white; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
  #saveBtn:hover { background: #197449; }
  #saveBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  #logoutBtn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; font-size: 13px; font-family: inherit; color: var(--text-muted); cursor: pointer; }
  #logoutBtn:hover { border-color: var(--danger); color: var(--danger); }

  .banner { background: #FFF8E8; border-bottom: 1px solid #F0DDA6; color: #7A5C10; font-size: 12.5px; padding: 8px 24px; text-align: center; }
  .dirty-banner { display: none; background: #FBF0DD; border-bottom: 1px solid #EAC97A; color: #8A5A00; font-size: 12.5px; padding: 8px 24px; text-align: center; font-weight: 600; }
  .dirty-banner.show { display: block; }

  main { max-width: 1040px; margin: 0 auto; padding: 24px; }
  .loading, .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }

  .category {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 20px; overflow: hidden;
  }
  .category-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .category-header input.cat-title { font-size: 15px; font-weight: 600; border: 1px solid transparent; border-radius: 6px; padding: 6px 8px; background: transparent; font-family: inherit; flex: 1; min-width: 160px; }
  .category-header input.cat-title:focus { border-color: var(--accent); background: var(--bg); outline: none; }
  .category-header input.cat-id { font-size: 11px; color: var(--text-muted); border: 1px solid transparent; border-radius: 6px; padding: 6px 8px; background: transparent; font-family: 'JetBrains Mono', monospace; width: 140px; }
  .category-header input.cat-id:focus { border-color: var(--accent); background: var(--bg); outline: none; }
  .cat-actions { display: flex; gap: 8px; }
  .cat-actions button { font-family: inherit; font-size: 12px; border: 1px solid var(--border); background: var(--surface); border-radius: 6px; padding: 6px 10px; cursor: pointer; color: var(--text); }
  .cat-actions button.delete-cat:hover { border-color: var(--danger); color: var(--danger); }

  .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; padding: 16px; }
  .item-card { border: 1px solid var(--border); border-radius: 8px; padding: 12px; background: var(--bg); }
  .item-card input, .item-card textarea { width: 100%; font-family: inherit; font-size: 13px; border: 1px solid var(--border); border-radius: 5px; padding: 6px 8px; margin-bottom: 6px; background: var(--surface); }
  .item-card input.item-name { font-weight: 600; font-size: 13.5px; }
  .item-card input.item-price { font-family: 'JetBrains Mono', monospace; }
  .item-card textarea { resize: vertical; min-height: 42px; font-size: 12.5px; }
  .item-card .item-row { display: flex; gap: 6px; }
  .item-card .item-row input { flex: 1; }
  .item-card .image-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .item-card .image-row input.item-image { flex: 1; margin-bottom: 0; }
  .item-card .thumb { width: 34px; height: 34px; border-radius: 5px; object-fit: cover; border: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .item-card .thumb.empty { display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text-muted); }
  .item-card .upload-btn { flex-shrink: 0; font-family: inherit; font-size: 11px; border: 1px solid var(--border); background: var(--surface); border-radius: 5px; padding: 6px 8px; cursor: pointer; color: var(--text); white-space: nowrap; }
  .item-card .upload-btn:hover { border-color: var(--accent); color: var(--accent); }
  .item-card .upload-btn.uploading { opacity: 0.6; cursor: wait; }
  .item-card .item-footer { display: flex; justify-content: flex-end; margin-top: 4px; }
  .item-card .item-footer button { font-family: inherit; font-size: 11.5px; border: 1px solid var(--border); background: var(--surface); border-radius: 5px; padding: 4px 9px; cursor: pointer; color: var(--text-muted); }
  .item-card .item-footer button:hover { border-color: var(--danger); color: var(--danger); }
  .add-item-card { border: 1px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; min-height: 100px; background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; }
  .add-item-card:hover { border-color: var(--accent); color: var(--accent); }

  .add-category-btn { display: block; margin: 0 auto 30px; background: var(--accent); color: white; border: none; border-radius: 6px; padding: 10px 20px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .add-category-btn:hover { background: var(--accent-hover); }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 20; max-width: 90vw; }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--danger); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark"></div>
    <h1>Menu Manager</h1>
  </div>
  <div class="header-actions">
    <span class="repo-label" id="repoLabel"></span>
    <button id="saveBtn" disabled>Save changes</button>
    <button id="logoutBtn">Log out</button>
  </div>
</header>

<div class="banner">Saving commits directly to your GitHub repo. Your public menu updates ~30–60 seconds after saving.</div>
<div class="dirty-banner" id="dirtyBanner">You have unsaved changes — click "Save changes" to publish them.</div>

<main>
  <div id="content"><div class="loading">Loading menu…</div></div>
  <button class="add-category-btn" id="addCategoryBtn" style="display:none;">+ Add category</button>
</main>

<div class="toast" id="toast"></div>

<script>
  const token = sessionStorage.getItem('gh_token');
  const owner = sessionStorage.getItem('gh_owner');
  const repo = sessionStorage.getItem('gh_repo');
  const branch = sessionStorage.getItem('gh_branch') || 'main';

  if (!token || !owner || !repo) {
    window.location.href = '/admin/login.html';
  }
  document.getElementById('repoLabel').textContent = `${owner}/${repo} @ ${branch}`;

  const FILE_PATH = 'data/menu-data.json';
  const API_BASE = `https://api.github.com/repos/${owner}/${repo}/contents/${FILE_PATH}`;
  let currentSha = null;
  let menuData = [];
  let dirty = false;
  let nextItemId = 1;

  const content = document.getElementById('content');
  const saveBtn = document.getElementById('saveBtn');
  const addCategoryBtn = document.getElementById('addCategoryBtn');
  const dirtyBanner = document.getElementById('dirtyBanner');
  const toast = document.getElementById('toast');

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.classList.toggle('error', isError);
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function ghHeaders() {
    return { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' };
  }

  function markDirty() {
    dirty = true;
    saveBtn.disabled = false;
    dirtyBanner.classList.add('show');
  }

  function markClean() {
    dirty = false;
    saveBtn.disabled = true;
    dirtyBanner.classList.remove('show');
  }

  window.addEventListener('beforeunload', (e) => {
    if (dirty) { e.preventDefault(); e.returnValue = ''; }
  });

  async function loadMenu() {
    try {
      const res = await fetch(`${API_BASE}?ref=${branch}`, { headers: ghHeaders() });
      if (res.status === 401 || res.status === 403) {
        sessionStorage.clear();
        window.location.href = '/admin/login.html';
        return;
      }
      if (res.status === 404) {
        menuData = [];
        currentSha = null;
      } else {
        const data = await res.json();
        currentSha = data.sha;
        const decoded = decodeURIComponent(escape(atob(data.content)));
        menuData = JSON.parse(decoded);
      }
      // Find highest existing item id so new items don't collide
      nextItemId = 1;
      menuData.forEach(cat => (cat.items || []).forEach(it => {
        if (typeof it.id === 'number' && it.id >= nextItemId) nextItemId = it.id + 1;
      }));
      render();
      addCategoryBtn.style.display = 'block';
    } catch (err) {
      content.innerHTML = `<div class="empty">Could not load menu: ${escapeHtml(err.message)}</div>`;
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  function imageSrc(image) {
    if (!image) return '';
    if (/^https?:\/\//.test(image) || image.startsWith('data:')) return image;
    return `/assets/${image}`;
  }

  function sanitizeFilename(name) {
    const parts = name.split('.');
    const ext = (parts.pop() || 'jpg').toLowerCase();
    const base = parts.join('.').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-+|-+$)/g, '') || 'image';
    return `${base}.${ext}`;
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = () => reject(new Error('Could not read the selected file'));
      reader.readAsDataURL(file);
    });
  }

  async function uploadImageToRepo(file) {
    const filename = sanitizeFilename(file.name);
    const path = `assets/${filename}`;
    const base64 = await fileToBase64(file);
    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

    // Check whether a file with this name already exists (need its sha to overwrite)
    let sha = null;
    const existing = await fetch(`${url}?ref=${branch}`, { headers: ghHeaders() });
    if (existing.ok) {
      const existingData = await existing.json();
      sha = existingData.sha;
      if (!confirm(`"${filename}" already exists in /assets. Overwrite it?`)) {
        throw new Error('__cancelled__');
      }
    }

    const body = { message: `Upload image ${filename}`, content: base64, branch };
    if (sha) body.sha = sha;

    const res = await fetch(url, {
      method: 'PUT',
      headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'GitHub rejected the image upload.');
    }
    return filename;
  }

  function render() {
    if (menuData.length === 0) {
      content.innerHTML = `<div class="empty">No categories yet. Add your first one below.</div>`;
      return;
    }
    content.innerHTML = menuData.map((cat, catIndex) => `
      <div class="category" data-cat-index="${catIndex}">
        <div class="category-header">
          <input class="cat-title" value="${escapeHtml(cat.title)}" placeholder="Category title" />
          <input class="cat-id" value="${escapeHtml(cat.categoryId)}" placeholder="category-id" />
          <div class="cat-actions">
            <button class="delete-cat">Delete category</button>
          </div>
        </div>
        <div class="items-grid">
          ${(cat.items || []).map((item, itemIndex) => `
            <div class="item-card" data-item-index="${itemIndex}">
              <input class="item-name" value="${escapeHtml(item.name)}" placeholder="Item name" />
              <textarea class="item-desc" placeholder="Description">${escapeHtml(item.description)}</textarea>
              <div class="item-row">
                <input class="item-price" type="number" step="0.01" min="0" value="${item.price ?? ''}" placeholder="Price" />
                <input class="item-badge" value="${escapeHtml(item.badge)}" placeholder="Badge (optional)" />
              </div>
              <div class="image-row">
                ${item.image
                  ? `<img class="thumb" src="${imageSrc(item.image)}" onerror="this.outerHTML='<div class=&quot;thumb empty&quot;>none</div>'" />`
                  : `<div class="thumb empty">none</div>`}
                <input class="item-image" value="${escapeHtml(item.image)}" placeholder="Image filename or URL" />
                <button type="button" class="upload-btn">Upload…</button>
                <input type="file" class="item-image-file" accept="image/*" style="display:none;" />
              </div>
              <div class="item-footer"><button class="delete-item">Delete item</button></div>
            </div>
          `).join('')}
          <div class="add-item-card">+ Add item</div>
        </div>
      </div>
    `).join('');

    // Wire up events
    content.querySelectorAll('.category').forEach(catEl => {
      const catIndex = Number(catEl.dataset.catIndex);

      catEl.querySelector('.cat-title').addEventListener('input', (e) => {
        menuData[catIndex].title = e.target.value; markDirty();
      });
      catEl.querySelector('.cat-id').addEventListener('input', (e) => {
        menuData[catIndex].categoryId = e.target.value; markDirty();
      });
      catEl.querySelector('.delete-cat').addEventListener('click', () => {
        if (!confirm(`Delete category "${menuData[catIndex].title}" and all its items?`)) return;
        menuData.splice(catIndex, 1);
        markDirty();
        render();
      });
      catEl.querySelector('.add-item-card').addEventListener('click', () => {
        menuData[catIndex].items = menuData[catIndex].items || [];
        menuData[catIndex].items.push({ id: nextItemId++, name: '', description: '', price: 0, badge: '', image: '' });
        markDirty();
        render();
      });

      catEl.querySelectorAll('.item-card').forEach(itemEl => {
        const itemIndex = Number(itemEl.dataset.itemIndex);
        const item = menuData[catIndex].items[itemIndex];

        itemEl.querySelector('.item-name').addEventListener('input', (e) => { item.name = e.target.value; markDirty(); });
        itemEl.querySelector('.item-desc').addEventListener('input', (e) => { item.description = e.target.value; markDirty(); });
        itemEl.querySelector('.item-price').addEventListener('input', (e) => { item.price = parseFloat(e.target.value) || 0; markDirty(); });
        itemEl.querySelector('.item-badge').addEventListener('input', (e) => { item.badge = e.target.value; markDirty(); });
        itemEl.querySelector('.item-image').addEventListener('input', (e) => { item.image = e.target.value; markDirty(); });

        const uploadBtn = itemEl.querySelector('.upload-btn');
        const fileInput = itemEl.querySelector('.item-image-file');
        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async () => {
          const file = fileInput.files[0];
          if (!file) return;
          uploadBtn.disabled = true;
          uploadBtn.classList.add('uploading');
          uploadBtn.textContent = 'Uploading…';
          try {
            const filename = await uploadImageToRepo(file);
            item.image = filename;
            markDirty();
            showToast(`Image uploaded as "${filename}" — click Save changes to link it to this item`);
            render();
          } catch (err) {
            if (err.message !== '__cancelled__') showToast(err.message, true);
          } finally {
            uploadBtn.disabled = false;
            uploadBtn.classList.remove('uploading');
            uploadBtn.textContent = 'Upload…';
            fileInput.value = '';
          }
        });

        itemEl.querySelector('.delete-item').addEventListener('click', () => {
          if (!confirm(`Delete "${item.name || 'this item'}"?`)) return;
          menuData[catIndex].items.splice(itemIndex, 1);
          markDirty();
          render();
        });
      });
    });
  }

  addCategoryBtn.addEventListener('click', () => {
    menuData.push({ categoryId: '', title: '', items: [] });
    markDirty();
    render();
  });

  saveBtn.addEventListener('click', async () => {
    // Basic validation before committing
    for (const cat of menuData) {
      if (!cat.categoryId.trim() || !cat.title.trim()) {
        showToast('Every category needs a title and category-id', true);
        return;
      }
      for (const item of cat.items || []) {
        if (!item.name.trim()) {
          showToast('Every item needs a name', true);
          return;
        }
      }
    }

    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';
    try {
      const contentB64 = btoa(unescape(encodeURIComponent(JSON.stringify(menuData, null, 2))));
      const body = { message: 'Update menu via admin panel', content: contentB64, branch };
      if (currentSha) body.sha = currentSha;

      const res = await fetch(API_BASE, {
        method: 'PUT',
        headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || 'GitHub rejected the save.');
      }
      const data = await res.json();
      currentSha = data.content.sha;
      markClean();
      showToast('Menu saved and publishing…');
    } catch (err) {
      showToast(err.message, true);
    } finally {
      saveBtn.textContent = 'Save changes';
      saveBtn.disabled = !dirty;
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    if (dirty && !confirm('You have unsaved changes. Log out anyway?')) return;
    sessionStorage.clear();
    window.location.href = '/admin/login.html';
  });

  loadMenu();
</script>
</body>
</html>
