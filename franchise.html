<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Franchise | Hot N Spicy</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=20260704d">
<link rel="stylesheet" href="theme-red.css?v=20260706a">
</head>
<body>

    <!-- Shared header (overlay, location modal, sidebars, main header) is injected here from header.html -->
    <div id="header-placeholder"></div>

    <main class="page-wrapper">
        <div class="page-card">
            <h1 class="page-title">Franchise Inquiry</h1>

            <form id="franchise-form" onsubmit="submitFranchiseInquiry(event)">
                <div class="form-grid">
                    <div class="form-field">
                        <label for="franchise-name">Full Name</label>
                        <input type="text" id="franchise-name" placeholder="Full Name" required>
                    </div>
                    <div class="form-field">
                        <label for="franchise-email">Email</label>
                        <input type="email" id="franchise-email" placeholder="Email">
                    </div>
                    <div class="form-field">
                        <label for="franchise-phone">Phone</label>
                        <input type="tel" id="franchise-phone" placeholder="Phone" required>
                    </div>
                    <div class="form-field">
                        <label for="franchise-city">City</label>
                        <input type="text" id="franchise-city" placeholder="City">
                    </div>
                    <div class="form-field full-width">
                        <label for="franchise-capacity">Investment Capacity</label>
                        <select id="franchise-capacity">
                            <option value="" disabled selected>Investment Capacity</option>
                            <option value="PKR 50-70 Lakh">PKR 50-70 Lakh</option>
                            <option value="PKR 70-90 Lakh">PKR 70-90 Lakh</option>
                            <option value="PKR 90-120 Lakh">PKR 90-120 Lakh</option>
                            <option value="PKR 120-150 Lakh">PKR 120-150 Lakh</option>
                            <option value="PKR 150+ Lakh">PKR 150+ Lakh</option>
                        </select>
                    </div>
                    <div class="form-field full-width">
                        <label for="franchise-message">Message</label>
                        <textarea id="franchise-message" placeholder="Tell us about your experience and why you want to partner with us"></textarea>
                    </div>
                </div>
                <button type="submit" class="form-submit-btn">Submit Inquiry</button>
            </form>
        </div>
    </main>

    <!-- Shared footer (footer + floating action buttons) is injected here from footer.html -->
    <div id="footer-placeholder"></div>

    <script src="app.js?v=20260704d"></script>
</body>
</html>
